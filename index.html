<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>POS System</title>
    <link rel="stylesheet" href="kerak.css">
  </head>
  <body>
    <div class="header">
      <h1>POS</h1>
      <input class="search" type="text" placeholder="Search product..." />
      <button>ADD TABLE</button>
    </div>

    <div class="container">
      <div class="sidebar">
        <div>🏠</div>
        <div>📋</div>
        <div>💳</div>
        <div>⚙️</div>
      </div>

      <div class="products">
        <div class="card">
          <img
            src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ2waVV5Tnme9GvJ9ke0M9fp_7yR71vVE5J-w&s"
          />
          <h3>Chicken Wings</h3>
        </div>

        <div class="card">
          <img
            src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTIUzERgVNoFDB8gpKrOOxmu50m-gAy1Ph-_A&s"
          />
          <h3>French Fries</h3>
        </div>

        <div class="card">
          <img
            src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRwXG4_aOt1el-YURQwHon-g3N5L0yzN6fgTQ&s"
          />
          <h3>Summer Salad</h3>
        </div>

        <div class="card">
          <img
            src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTdKH5M4uTb5vafz6R2YXfF7eo3aWDx5B0cBg&s"
          />
          <h3>Drinks</h3>
        </div>
      </div>

      <div class="order">
        <h2>ORDER #12564878</h2>

        <div class="item">
          <span>Chicken Wings</span>
          <span>$20</span>
        </div>

        <div class="item">
          <span>Summer Salad</span>
          <span>$10</span>
        </div>

        <div class="item">
          <span>French Fries</span>
          <span>$5</span>
        </div>

        <div class="total">TOTAL: $38.50</div>

        <div class="buttons">
          <button class="cancel">Cancel</button>
          <button class="send">Send Order</button>
        </div>
      </div>
    </div>
  </body>
</html>
